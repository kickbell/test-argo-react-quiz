name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24

    - name: Install dependencies
      # 경로를 한 단계만 내려가도록 수정
      working-directory: ./test-front
      run: npm install

    - name: Build React app
      working-directory: ./test-front
      run: CI=false npm run build

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      # Dockerfile과 빌드 결과물(build/)이 test-front 폴더 안에 있으므로 경로 지정
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/front_app:1.0 ./test-front

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/front_app:1.0